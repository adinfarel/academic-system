<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login ke Scholaria — Sistem Akademik Terintegrasi">
  <title>Masuk — Scholaria</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">

  <style>
    .login-layout {
      position: relative;
      min-height: 100vh;
      display: flex;
      justify-content: flex-end; /* Form di sisi kanan */
      overflow: hidden;
      background: #fafafa;
    }

    #login-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1; /* Di bawah form */
    }

    .login-form-side {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-2xl);
      position: relative;
      z-index: 2; /* Di atas canvas */
      width: 100%;
      max-width: 50vw; /* Mengambil setengah layar kanan */
      /* Seamless integration — no background/borders */
      background: transparent;
    }

    @media (max-width: 768px) {
      .login-form-side {
        max-width: 100%;
        background: rgba(255, 255, 255, 0.85);
      }
    }

    .login-form-box {
      width: 100%;
      max-width: 420px;
    }

    .login-type-title {
      font-family: 'Times New Roman', Times, serif;
      font-size: var(--text-3xl);
      font-weight: normal;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-xs);
      min-height: 1.2em;
      white-space: nowrap;
    }

    .login-type-cursor {
      display: inline-block;
      width: 4px;
      height: 1em;
      margin-left: 3px;
      vertical-align: text-bottom;
      border-radius: 2px;
      animation: blink 0.75s step-end infinite, cursorColor 2s linear infinite;
    }

    .login-type-cursor.done {
      animation: none;
      background: transparent;
    }

    .login-subtitle {
      font-size: var(--text-sm);
      color: var(--fg-muted);
      margin-bottom: var(--space-2xl);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .login-subtitle.show {
      opacity: 1;
    }

    .login-form-group {
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.5s ease;
    }

    .login-form-group.show {
      opacity: 1;
      transform: translateY(0);
    }

    .login-back {
      position: absolute;
      top: var(--space-lg);
      left: var(--space-xl);
      font-size: var(--text-sm);
      color: var(--fg-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .login-back:hover {
      color: var(--fg-primary);
      opacity: 1;
    }

    .login-error {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      font-size: var(--text-sm);
      color: var(--danger);
      margin-bottom: var(--space-lg);
      display: none;
    }

    .login-error.show {
      display: block;
      animation: shake 0.4s ease;
    }

    .login-footer {
      margin-top: var(--space-xl);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .login-footer.show {
      opacity: 1;
    }

    /* ── Password Toggle Eye ── */
    .password-wrapper {
      position: relative;
    }

    .password-wrapper .form-input {
      padding-right: 44px;
    }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--fg-muted);
      font-size: 18px;
      line-height: 1;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-toggle:hover {
      color: var(--fg-primary);
    }

    .password-toggle svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>

<body>

  <div class="login-layout">
    <!-- Canvas utuh sebagai background -->
    <canvas id="login-particles"></canvas>

    <!-- Right: Form panel -->
    <div class="login-form-side">
      <a href="index.html" class="login-back">← Kembali</a>

      <div class="login-form-box">
        <div class="login-type-title">
          <span id="login-type-target"></span><span class="login-type-cursor" id="login-cursor"></span>
        </div>
        <p class="login-subtitle" id="login-subtitle">Masuk ke Scholaria — sistem akademik Anda</p>

        <div class="login-form-group" id="login-form-group">
          <div class="login-error" id="login-error"></div>

          <form id="login-form" autocomplete="on">
            <div class="form-group">
              <label class="form-label" for="username">Username</label>
              <input type="text" id="username" name="username" class="form-input" placeholder="Masukkan username"
                required autocomplete="username">
            </div>
            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <div class="password-wrapper">
                <input type="password" id="password" name="password" class="form-input" placeholder="Masukkan password"
                  required autocomplete="current-password">
                <button type="button" class="password-toggle" id="toggle-password" aria-label="Tampilkan password">
                  <svg id="eye-open" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                  <svg id="eye-closed" viewBox="0 0 24 24" style="display:none;">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                  </svg>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-full btn-lg" id="login-btn">Masuk</button>
          </form>

          <div class="login-footer" id="login-footer">
            <p class="text-sm text-muted">
              Belum punya akun? <a href="register.html"
                style="color: var(--fg-primary); text-decoration: underline;">Daftar di sini</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/particles-login.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (isLoggedIn()) {
        const role = getUserRole();
        if (role) redirectToDashboard(role);
        return;
      }

      // Particles — Antigravity Text
      new AntigravityText('login-particles', {
        text: 'Scholaria',
        colors: ['#000000', '#111111', '#1a1a1a', '#222222'],
        particleSize: 2.2,
        textGap: 7, 
        fontSize: 200, // Maximum size on large monitors
        offsetXPercent: 0.04, // 4% off the left edge (Responsive)
        returnSpeed: 0.01
      });

      // ── Determine role from URL query ──
      const urlParams = new URLSearchParams(window.location.search);
      const role = urlParams.get('role'); // 'mahasiswa' | 'dosen' | null

      // Typing title based on role
      let phrase = "Selamat Datang";
      if (role === 'mahasiswa') phrase = "Selamat Datang Mahasiswa";
      else if (role === 'dosen') phrase = "Selamat Datang Dosen";

      const target = document.getElementById('login-type-target');
      const cursor = document.getElementById('login-cursor');
      let i = 0;

      function typeChar() {
        if (i < phrase.length) {
          target.textContent += phrase[i];
          i++;
          setTimeout(typeChar, 50 + Math.random() * 30);
        } else {
          setTimeout(onDone, 200);
        }
      }

      function onDone() {
        cursor.classList.add('done');
        setTimeout(() => document.getElementById('login-subtitle').classList.add('show'), 100);
        setTimeout(() => document.getElementById('login-form-group').classList.add('show'), 300);

        // Dosen: sembunyikan link daftar. Hanya mahasiswa yang boleh daftar.
        if (role !== 'dosen') {
          setTimeout(() => document.getElementById('login-footer').classList.add('show'), 500);
        }

        setTimeout(() => document.getElementById('username').focus(), 600);
      }

      setTimeout(typeChar, 400);

      // ── Password Visibility Toggle ──
      const toggleBtn = document.getElementById('toggle-password');
      const passwordInput = document.getElementById('password');
      const eyeOpen = document.getElementById('eye-open');
      const eyeClosed = document.getElementById('eye-closed');

      toggleBtn.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeOpen.style.display = isPassword ? 'none' : 'block';
        eyeClosed.style.display = isPassword ? 'block' : 'none';
      });

      // ── Login form ──
      const form = document.getElementById('login-form');
      const errorEl = document.getElementById('login-error');
      const loginBtn = document.getElementById('login-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) { showError('Username dan password wajib diisi.'); return; }

        loginBtn.disabled = true;
        loginBtn.textContent = 'Memproses...';
        errorEl.classList.remove('show');

        try {
          const data = await apiLogin(username, password);
          showToast(`Selamat datang, ${data.username}!`, 'success');
          setTimeout(() => redirectToDashboard(data.role), 500);
        } catch (error) {
          showError(error.message);
          loginBtn.disabled = false;
          loginBtn.textContent = 'Masuk';
        }
      });

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('show');
      }
    });
  </script>
</body>

</html>
